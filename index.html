<!DOCTYPE html>
<html>

<head>
    <title>Skyblock Fusion Profits</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="layout">

    <!-- LEFT PANEL -->
    <div id="modifier-panel">

        <h1>Skyblock Fusion Profits</h1>

        <h2>Hunter Fortune</h2>
        <input id="hunterFortune" type="number" value="0" min="0" max="121"/>

        <h2>Shard Levels</h2>

        <div class="grid-3x3">

            <div class="grid-item">Newt<br><input id="newtLevel" type="number" value="0" min="0" max="10"></div>
            <div class="grid-item">Salamander<br><input id="salamanderLevel" type="number" value="0" min="0" max="10"></div>
            <div class="grid-item">Lizard King<br><input id="lizardKingLevel" type="number" value="0" min="0" max="10"></div>

            <div class="grid-item">Leviathan<br><input id="leviathanLevel" type="number" value="0" min="0" max="10"></div>
            <div class="grid-item">Python<br><input id="pythonLevel" type="number" value="0" min="0" max="10"></div>
            <div class="grid-item">King Cobra<br><input id="kingCobraLevel" type="number" value="0" min="0" max="10"></div>

            <div class="grid-item">Sea Serpent<br><input id="seaSerpentLevel" type="number" value="0" min="0" max="10"></div>
            <div class="grid-item">Tiamat<br><input id="tiamatLevel" type="number" value="0" min="0" max="10"></div>
            <div class="grid-item">Crocodile<br><input id="crocodileLevel" type="number" value="0" min="0" max="10"></div>

        </div>

        <h2>Tools</h2>

        <label>
            Medium Pocket Black Hole
            <input id="mediumBlackHole" type="checkbox">
        </label>

        <h2>Results</h2>

        <label style="font-weight:bold; display:block; margin-bottom:5px;">
            Show Results
        </label>

        <select id="resultLimitSelect">
            <option value="10" selected>Top 10</option>
            <option value="25">Top 25</option>
            <option value="50">Top 50</option>
        </select>

    </div>

    <!-- RIGHT PANEL -->
    <div id="results"></div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
